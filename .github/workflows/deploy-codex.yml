name: Deploy phone apps (Codex + Mana + DM Eye + Character)

on:
  push:
    branches: [main]
    paths:
      - "codex-5e/**"
      - "kirito-mana-app/**"
      - "dm-eye/**"
      - "character/**"
      - "shared/**"
      - "pages-hub/**"
      - ".github/workflows/deploy-codex.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish folder
        run: |
          mkdir -p publish
          # Hub at site root — pick Codex, Mana, DM Eye, or Character
          cp -R pages-hub/. publish/
          # Separate apps on separate paths (separate SW scopes)
          mkdir -p publish/codex publish/mana publish/dm-eye publish/Character
          cp -R codex-5e/. publish/codex/
          cp -R kirito-mana-app/. publish/mana/
          cp -R dm-eye/. publish/dm-eye/
          cp -R character/. publish/Character/
          # Keep shared DM link module in sync for all apps
          cp shared/dm-link.js publish/codex/data/dm-link.js
          cp shared/dm-link.js publish/mana/data/dm-link.js
          cp shared/dm-link.js publish/dm-eye/data/dm-link.js
          touch publish/.nojekyll
          touch publish/codex/.nojekyll
          touch publish/mana/.nojekyll
          touch publish/dm-eye/.nojekyll
          touch publish/Character/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
