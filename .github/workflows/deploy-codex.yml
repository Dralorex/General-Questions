name: Deploy Codex 5e PWA

on:
  push:
    branches: [main]
    paths:
      - "codex-5e/**"
      - ".github/workflows/deploy-codex.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish folder
        run: |
          mkdir -p publish
          cp -R codex-5e/. publish/
          # Keep original mana app available at /mana/
          mkdir -p publish/mana
          cp -R kirito-mana-app/. publish/mana/
          touch publish/.nojekyll
          touch publish/mana/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
